services:
  mysql:
    image: mysql:8.4
    container_name: boarding-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-quan_ly_phong_tro}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: boarding-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  auth-service:
    build:
      context: .
    container_name: boarding-auth-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-quan_ly_phong_tro}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-docker}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    command: sh -c "npm run migrate && npm run seed && npm run start:auth"

  room-service:
    build:
      context: .
    container_name: boarding-room-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      billing-calculator:
        condition: service_started
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-quan_ly_phong_tro}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-docker}
      BILLING_SERVICE_URL: http://billing-calculator:8000
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "3002:3002"
    command: npm run start:room

  billing-calculator:
    build:
      context: ./billing-service
    container_name: boarding-billing-calculator
    ports:
      - "8000:8000"

  billing-service:
    build:
      context: .
    container_name: boarding-billing-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      billing-calculator:
        condition: service_started
    environment:
      PORT: 3005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-quan_ly_phong_tro}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-docker}
      BILLING_SERVICE_URL: http://billing-calculator:8000
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "3005:3005"
    command: npm run start:billing

  report-service:
    build:
      context: .
    container_name: boarding-report-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-quan_ly_phong_tro}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-docker}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "3003:3003"
    command: npm run start:report

  frontend-ui:
    build:
      context: ./giaodien
    container_name: boarding-frontend-ui
    environment:
      VITE_AUTH_API_URL: http://localhost:3001
      VITE_ROOM_API_URL: http://localhost:3002
      VITE_BILLING_API_URL: http://localhost:3005
      VITE_REPORT_API_URL: http://localhost:3003
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - room-service
      - billing-service
      - report-service

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: boarding-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - room-service
      - billing-service
      - billing-calculator
      - report-service

  grafana:
    image: grafana/grafana:11.3.0
    container_name: boarding-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3004:3000"
    depends_on:
      - prometheus

  sonarqube:
    image: sonarqube:10.7-community
    container_name: boarding-sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs

volumes:
  mysql-data:
  redis-data:
  grafana-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
